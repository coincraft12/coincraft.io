name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ''

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 46.62.212.134 >> ~/.ssh/known_hosts

      - name: Package
        run: |
          tar -czf /tmp/next-build.tar.gz \
            --exclude='.next/cache' \
            --exclude='.next/dev' \
            --exclude='.next/standalone' \
            .next/
          tar -czf /tmp/public.tar.gz public/

      - name: Upload
        run: |
          scp /tmp/next-build.tar.gz root@46.62.212.134:/opt/coincraft-web/next-build.tar.gz
          scp /tmp/public.tar.gz root@46.62.212.134:/opt/coincraft-web/public.tar.gz
          scp .next/standalone/server.js root@46.62.212.134:/opt/coincraft-web/server.js

      - name: Deploy
        run: |
          ssh root@46.62.212.134 "
            set -e
            cd /opt/coincraft-web

            tar -xzf public.tar.gz && rm public.tar.gz

            pm2 stop coincraft-web
            rm -rf .next-old
            mv .next .next-old
            tar -xzf next-build.tar.gz
            rm next-build.tar.gz

            if [ -f ecosystem.config.js ]; then
              pm2 start ecosystem.config.js
            else
              API_INTERNAL_URL=http://localhost:4000 NODE_ENV=production PORT=3000 \
              pm2 start server.js --name coincraft-web
            fi

            sleep 3
            pm2 status coincraft-web
          "

      - name: Health check
        run: |
          sleep 5
          curl -sf https://coincraft.io > /dev/null && echo "Web: OK" || exit 1
          curl -sf https://coincraft.io/api/v1/courses > /dev/null && echo "API: OK" || exit 1
