name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ''

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 204.168.242.99 >> ~/.ssh/known_hosts
        working-directory: .

      - name: Package
        run: |
          tar -czf /tmp/next-build.tar.gz \
            --exclude='.next/cache' \
            --exclude='.next/dev' \
            --exclude='.next/standalone' \
            .next/
          tar -czf /tmp/public.tar.gz public/

      - name: Upload
        run: |
          scp /tmp/next-build.tar.gz root@204.168.242.99:/opt/coincraft-staging/next-build.tar.gz
          scp /tmp/public.tar.gz root@204.168.242.99:/opt/coincraft-staging/public.tar.gz
          scp .next/standalone/server.js root@204.168.242.99:/opt/coincraft-staging/server.js

      - name: Deploy
        run: |
          ssh root@204.168.242.99 "
            set -e
            cd /opt/coincraft-staging

            tar -xzf public.tar.gz && rm public.tar.gz

            pm2 stop coincraft-staging
            rm -rf .next-old
            mv .next .next-old
            tar -xzf next-build.tar.gz
            rm next-build.tar.gz

            if [ -f ecosystem.config.js ]; then
              pm2 start ecosystem.config.js
            else
              API_INTERNAL_URL=http://localhost:4001 NODE_ENV=production PORT=3000 \
              pm2 start server.js --name coincraft-staging
            fi

            sleep 3
            pm2 status coincraft-staging
          "
        working-directory: .

      - name: Health check
        run: |
          sleep 5
          curl -sf https://staging.coincraft.io > /dev/null && echo "Web: OK" || exit 1
          curl -sf https://staging.coincraft.io/api/v1/courses > /dev/null && echo "API: OK" || exit 1
        working-directory: .
