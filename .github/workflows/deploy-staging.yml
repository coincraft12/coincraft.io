name: Deploy to Staging

on:
  push:
    branches: [master]

jobs:
  deploy-api:
    name: Deploy API to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install and build
        working-directory: api
        run: npm ci && npm run build
      - name: Package dist
        working-directory: api
        run: tar czf api-dist.tar.gz dist
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Upload and deploy
        run: |
          scp api/api-dist.tar.gz ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "cd /opt/coincraft-api && tar xzf /tmp/api-dist.tar.gz && pm2 restart coincraft-api-staging"

  deploy-web:
    name: Deploy Web to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        run: npm ci && cp .env.staging .env.local && npm run build
      - name: Package build
        working-directory: web
        run: tar czf next_build.tar.gz .next
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Upload and deploy
        run: |
          scp web/next_build.tar.gz ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "cd /opt/coincraft-staging && tar xzf /tmp/next_build.tar.gz && cp .next/standalone/server.js server.js && pm2 restart coincraft-staging"
