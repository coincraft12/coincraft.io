name: Deploy to Staging

on:
  push:
    branches: [master]

jobs:
  deploy-api:
    name: Deploy API to Staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Package dist
        run: tar czf api-dist.tar.gz dist
      - name: Upload dist to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "api/api-dist.tar.gz"
          target: /tmp/
          strip_components: 1
      - name: Extract and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/coincraft-api
            tar xzf /tmp/api-dist.tar.gz
            pm2 restart coincraft-api-staging

  deploy-web:
    name: Deploy Web to Staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Set staging env
        run: cp .env.staging .env.local
      - run: npm run build
      - name: Package build
        run: tar czf next_build.tar.gz .next
      - name: Upload to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "web/next_build.tar.gz"
          target: /tmp/
          strip_components: 1
      - name: Extract and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/coincraft-staging
            tar xzf /tmp/next_build.tar.gz
            cp .next/standalone/server.js server.js
            pm2 restart coincraft-staging
