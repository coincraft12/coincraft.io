name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 204.168.242.99 >> ~/.ssh/known_hosts

      # ── API 빌드 & 배포 ──────────────────────────────────────────────────────

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Package API
        working-directory: api
        run: |
          tar -czf /tmp/coincraft-api-build.tar.gz \
            dist/ \
            src/db/migrations/ \
            package.json \
            package-lock.json

      - name: Upload & Deploy API
        run: |
          scp /tmp/coincraft-api-build.tar.gz root@204.168.242.99:/opt/coincraft-api/api-build.tar.gz
          ssh root@204.168.242.99 "
            set -e
            cd /opt/coincraft-api
            tar -xzf api-build.tar.gz && rm api-build.tar.gz
            npm install --omit=dev
            node dist/db/migrate.js
            pm2 restart coincraft-api --update-env
            sleep 2
            pm2 status coincraft-api
          "

      # ── Web 빌드 & 배포 ──────────────────────────────────────────────────────

      - name: Install Web dependencies
        working-directory: web
        run: npm ci

      - name: Build Web
        working-directory: web
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ''

      - name: Package Web
        working-directory: web
        run: |
          tar -czf /tmp/next-build.tar.gz \
            --exclude='.next/cache' \
            --exclude='.next/dev' \
            --exclude='.next/standalone' \
            .next/
          tar -czf /tmp/public.tar.gz public/

      - name: Upload Web
        working-directory: web
        run: |
          scp /tmp/next-build.tar.gz root@204.168.242.99:/opt/coincraft-staging/next-build.tar.gz
          scp /tmp/public.tar.gz root@204.168.242.99:/opt/coincraft-staging/public.tar.gz
          scp .next/standalone/server.js root@204.168.242.99:/opt/coincraft-staging/server.js

      - name: Deploy Web
        run: |
          ssh root@204.168.242.99 "
            set -e
            cd /opt/coincraft-staging

            tar -xzf public.tar.gz && rm public.tar.gz

            pm2 stop coincraft-staging
            rm -rf .next-old
            mv .next .next-old
            tar -xzf next-build.tar.gz
            rm next-build.tar.gz

            if [ -f ecosystem.config.js ]; then
              pm2 start ecosystem.config.js
            else
              API_INTERNAL_URL=http://localhost:4001 NODE_ENV=production PORT=3000 \
              pm2 start server.js --name coincraft-staging
            fi

            sleep 3
            pm2 status coincraft-staging
          "

      # ── 강의자료 DB 시딩 ─────────────────────────────────────────────────────

      - name: Seed course materials
        working-directory: api
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          npx tsx scripts/bulk-upload-onchain-materials.ts || echo "⚠ Seed skipped (local files unavailable)"
          npx tsx scripts/bulk-upload-ethereum-materials.ts || echo "⚠ Seed skipped (local files unavailable)"
          npx tsx scripts/bulk-upload-web3intro-materials.ts || echo "⚠ Seed skipped (local files unavailable)"
          npx tsx scripts/bulk-upload-web3basic-materials.ts || echo "⚠ Seed skipped (local files unavailable)"
          npx tsx scripts/bulk-upload-web3associate-materials.ts || echo "⚠ Seed skipped (local files unavailable)"

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            sleep 3
            curl -sf https://staging.coincraft.io > /dev/null && echo "Web: OK" && \
            curl -sf https://staging.coincraft.io/api/v1/courses > /dev/null && echo "API: OK" && exit 0
            echo "Attempt $i failed, retrying..."
          done
          echo "Health check failed after 30s" && exit 1
