name: Deploy to Staging

on:
  push:
    branches: [master]

jobs:
  deploy-api:
    name: Deploy API to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install and build
        working-directory: api
        run: npm ci && npm run build
      - name: Package dist
        working-directory: api
        run: tar czf api-dist.tar.gz dist package.json package-lock.json
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          python3 .github/scripts/write-ssh-key.py
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Upload and deploy
        run: |
          scp -i ~/.ssh/id_ed25519 api/api-dist.tar.gz ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "cd /opt/coincraft-api && tar xzf /tmp/api-dist.tar.gz && npm ci --production --silent && pm2 restart coincraft-api-staging"

  deploy-web:
    name: Deploy Web to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        run: npm ci && cp .env.staging .env.local && npm run build
      - name: Package build
        working-directory: web
        run: tar czf next_build.tar.gz .next public
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          python3 .github/scripts/write-ssh-key.py
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Upload and deploy
        run: |
          scp -i ~/.ssh/id_ed25519 web/next_build.tar.gz ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "cd /opt/coincraft-staging && tar xzf /tmp/next_build.tar.gz && cp -r public/. .next/standalone/public/ && cp .next/standalone/server.js server.js && pm2 restart coincraft-staging"
