name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 46.62.212.134 >> ~/.ssh/known_hosts

      # ── API 빌드 & 배포 ──────────────────────────────────────────────────────

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Compile seed scripts
        working-directory: api
        run: npx tsc -p scripts/tsconfig.scripts.json --skipLibCheck

      - name: Package API
        working-directory: api
        run: |
          tar -czf /tmp/coincraft-api-build.tar.gz \
            dist/ \
            dist-scripts/ \
            src/db/migrations/ \
            package.json \
            package-lock.json

      - name: Upload & Deploy API
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          scp /tmp/coincraft-api-build.tar.gz root@46.62.212.134:/opt/coincraft-api/api-build.tar.gz
          ssh root@46.62.212.134 "
            set -e
            cd /opt/coincraft-api
            tar -xzf api-build.tar.gz && rm api-build.tar.gz
            npm install --omit=dev
            node dist/db/migrate.js
            export S3_BUCKET='$S3_BUCKET'
            export S3_ENDPOINT='$S3_ENDPOINT'
            export S3_REGION='$S3_REGION'
            export S3_ACCESS_KEY_ID='$S3_ACCESS_KEY_ID'
            export S3_SECRET_ACCESS_KEY='$S3_SECRET_ACCESS_KEY'
            pm2 restart coincraft-api --update-env
            sleep 2
            pm2 status coincraft-api
            node dist-scripts/scripts/bulk-upload-onchain-materials.js
            node dist-scripts/scripts/bulk-upload-ethereum-materials.js
            node dist-scripts/scripts/bulk-upload-web3intro-materials.js
            node dist-scripts/scripts/bulk-upload-web3basic-materials.js
            node dist-scripts/scripts/bulk-upload-web3associate-materials.js
          "

      # ── Web 빌드 & 배포 ──────────────────────────────────────────────────────

      - name: Install Web dependencies
        working-directory: web
        run: npm ci

      - name: Build Web
        working-directory: web
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ''

      - name: Package Web
        working-directory: web
        run: |
          tar -czf /tmp/next-build.tar.gz \
            --exclude='.next/cache' \
            --exclude='.next/dev' \
            --exclude='.next/standalone' \
            .next/
          tar -czf /tmp/public.tar.gz public/

      - name: Upload Web
        working-directory: web
        run: |
          scp /tmp/next-build.tar.gz root@46.62.212.134:/opt/coincraft-web/next-build.tar.gz
          scp /tmp/public.tar.gz root@46.62.212.134:/opt/coincraft-web/public.tar.gz
          scp .next/standalone/server.js root@46.62.212.134:/opt/coincraft-web/server.js

      - name: Deploy Web
        run: |
          ssh root@46.62.212.134 "
            set -e
            cd /opt/coincraft-web

            tar -xzf public.tar.gz && rm public.tar.gz

            pm2 stop coincraft-web || true
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 1
            rm -rf .next-old
            mv .next .next-old
            tar -xzf next-build.tar.gz
            rm next-build.tar.gz

            npm install --omit=dev --prefer-offline 2>/dev/null || npm install --omit=dev

            if [ -f ecosystem.config.js ]; then
              pm2 start ecosystem.config.js
            else
              API_INTERNAL_URL=http://localhost:4000 NODE_ENV=production PORT=3000 \
              pm2 start server.js --name coincraft-web
            fi

            sleep 3
            pm2 status coincraft-web
          "

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            sleep 3
            curl -sf https://coincraft.io > /dev/null && echo "Web: OK" && \
            curl -sf https://coincraft.io/api/v1/courses > /dev/null && echo "API: OK" && exit 0
            echo "Attempt $i failed, retrying..."
          done
          echo "Health check failed after 30s" && exit 1
